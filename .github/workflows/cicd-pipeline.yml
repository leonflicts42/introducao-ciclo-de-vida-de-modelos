name: CI/CD Pipeline - Heart Disease Model

# Trigger: executa quando há push na branch main que afeta arquivos da aula 06
on:
  push:
    branches:
      - main
    paths:
      - 'aula_06_cicd_automacao/**'
      - 'data/**'
      - '.github/workflows/cicd-pipeline.yml'

  # Execução manual (agora sem seleção de modelo; usar comentário no código)
  workflow_dispatch:

jobs:
  # Job 1: Testes
  test:
    name: Rodar Testes
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Rodar testes
        run: |
          cd aula_06_cicd_automacao
          python test_pipeline.py
  
  # Job 2: Treinar Modelo Baseline
  train-baseline:
    name: Treinar Modelo (ACTIVE_PARAMS atual)
    runs-on: ubuntu-latest
    needs: test  # Só executa se os testes passarem
    
    # Configura MLflow tracking (pode usar servidor remoto ou local)
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Treinar modelo conforme ACTIVE_PARAMS
        run: |
          cd aula_06_cicd_automacao
          python train.py --min-accuracy 0.75
      
      - name: Upload MLflow artifacts (opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-baseline
          path: aula_06_cicd_automacao/mlruns/
          retention-days: 7
  
  # Job 3: Treinar Modelo Otimizado (condicional)
  train-optimized:
    name: Treinar Modelo (commit com [train-optimized])
    runs-on: ubuntu-latest
    needs: train-baseline  # Executa após baseline
    
    # Só executa se foi trigger manual OU se arquivos de treino foram modificados
    if: |
      github.event_name == 'workflow_dispatch' || 
      contains(github.event.head_commit.message, '[train-optimized]')
    
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Treinar novamente após alteração otimizada
        run: |
          cd aula_06_cicd_automacao
          python train.py --min-accuracy 0.75
      
      - name: Upload MLflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-optimized
          path: aula_06_cicd_automacao/mlruns/
          retention-days: 7
  
  # Job 4: Comparar Modelos e Promover (opcional)
  compare-and-promote:
    name: Comparar e Promover Modelo
    runs-on: ubuntu-latest
    needs: [train-baseline, train-optimized]
    if: success()
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Comparação de métricas
        run: |
          echo "✓ Pipeline de CI/CD concluído com sucesso!"
          echo "Modelos treinados e logados no MLflow."
          echo "Acesse o MLflow UI para comparar as métricas."
